# Android platform priors for Vigil.
# These are Android SDK / AndroidX / Material Design standard components.
# NOT app-specific — any Android app may use these widgets.
# Users can extend this file for OEM-specific or custom widgets.

# ──────────────────────────────────────────────────────────
# Widget guard templates: widget class → (safety, correctness)
# ──────────────────────────────────────────────────────────
widget_templates:

  # Pattern A: Binary toggle (checkable)
  Switch:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  ToggleButton:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  CheckBox:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  RadioButton:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  CompoundButton:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  SwitchCompat:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  MaterialSwitch:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"
  Chip:
    safety: "read({alias}, is_enabled) == true"
    correctness: "read({alias}, is_checked) == $intent.{var}"

  # Pattern B: Text input (editable)
  EditText:
    safety: "read({alias}, is_editable) == true"
    correctness: "value({alias}) == $intent.{var}"
  AutoCompleteTextView:
    safety: "read({alias}, is_editable) == true"
    correctness: "value({alias}) == $intent.{var}"
  MultiAutoCompleteTextView:
    safety: "read({alias}, is_editable) == true"
    correctness: "value({alias}) == $intent.{var}"
  TextInputEditText:
    safety: "read({alias}, is_editable) == true"
    correctness: "value({alias}) == $intent.{var}"
  SearchView:
    safety: "read({alias}, is_enabled) == true"
    correctness: "value({alias}) == $intent.{var}"

  # Pattern C: Click action
  Button:
    safety: "read({alias}, is_clickable) == true"
    correctness: "action(target_text) == $intent.{var}"
  MaterialButton:
    safety: "read({alias}, is_clickable) == true"
    correctness: "action(target_text) == $intent.{var}"
  TextView:
    safety: null
    correctness: "action(target_text) == $intent.{var}"
  ImageButton:
    safety: "read({alias}, is_clickable) == true"
    correctness: null
  ImageView:
    safety: "read({alias}, is_clickable) == true"
    correctness: null
  FloatingActionButton:
    safety: "read({alias}, is_clickable) == true"
    correctness: null
  ExtendedFloatingActionButton:
    safety: "read({alias}, is_clickable) == true"
    correctness: null

  # Pattern D: Selection from list
  Spinner:
    safety: "count({alias}) >= 1"
    correctness: "action(target_text) == $intent.{var}"
  ListView:
    safety: "count({alias}) >= 1"
    correctness: "action(target_text) == $intent.{var}"
  RecyclerView:
    safety: "count({alias}) >= 1"
    correctness: "action(target_text) == $intent.{var}"
  GridView:
    safety: "count({alias}) >= 1"
    correctness: "action(target_text) == $intent.{var}"
  ExpandableListView:
    safety: "count({alias}) >= 1"
    correctness: "action(target_text) == $intent.{var}"
  ViewPager2:
    safety: "count({alias}) >= 1"
    correctness: "action(target_text) == $intent.{var}"

  # Pattern E: Value picker
  TimePicker:
    safety: null
    correctness: "value({alias}) == $intent.{var}"
  DatePicker:
    safety: null
    correctness: "value({alias}) == $intent.{var}"
  NumberPicker:
    safety: null
    correctness: "value({alias}) == $intent.{var}"
  CalendarView:
    safety: null
    correctness: "value({alias}) == $intent.{var}"

  # Pattern F: Continuous value
  SeekBar:
    safety: "read({alias}, is_enabled) == true"
    correctness: "value({alias}) == $intent.{var}"
  RatingBar:
    safety: "read({alias}, is_enabled) == true"
    correctness: "value({alias}) == $intent.{var}"
  Slider:
    safety: "read({alias}, is_enabled) == true"
    correctness: "value({alias}) == $intent.{var}"

  # Pattern G: Tab/Navigation
  TabLayout:
    safety: null
    correctness: "action(target_text) == $intent.{var}"
  BottomNavigationView:
    safety: null
    correctness: "action(target_text) == $intent.{var}"
  NavigationView:
    safety: null
    correctness: "action(target_text) == $intent.{var}"
  NavigationRailView:
    safety: null
    correctness: "action(target_text) == $intent.{var}"
  Toolbar:
    safety: null
    correctness: "action(target_text) == $intent.{var}"


# ──────────────────────────────────────────────────────────
# Dialog indicators
# ──────────────────────────────────────────────────────────
dialog_indicators:
  classes:
    - AlertDialog
    - TimePickerDialog
    - DatePickerDialog
    - ProgressDialog
    - BottomSheetDialog
    - MaterialAlertDialogBuilder
    - DialogFragment
    - BottomSheetDialogFragment
    - TimePicker
    - DatePicker
    - NumberPicker
  resource_ids:
    - "android:id/button1"
    - "android:id/button2"
    - "android:id/button3"


# ──────────────────────────────────────────────────────────
# Tab navigation indicators
# ──────────────────────────────────────────────────────────
tab_indicators:
  classes:
    - BottomNavigationView
    - BottomNavigationItemView
    - NavigationBarView
    - TabLayout
    - TabItem
    - NavigationRailView


# ──────────────────────────────────────────────────────────
# Error state patterns
# ──────────────────────────────────────────────────────────
error_patterns:
  - "Webpage not available"
  - "Android System notif"
  - "App isn't responding"
  - "has stopped"
  - "isn't responding"
  - "Keep waiting"
  - "Unfortunately"
  - "No internet"


# ──────────────────────────────────────────────────────────
# Generic risk categories for native exploration.
# Keywords are substrings (case-insensitive). All categories are
# platform-level — NOT app-specific. Apps may tune per-deployment
# through configs/apps/<name>.yaml overrides.
# ──────────────────────────────────────────────────────────
risk_categories:
  destructive:
    - "factory reset"
    - "erase all data"
    - "wipe"
    - "reset phone"
    - "remove account"
    - "delete account"
  credential:
    - "confirm your pin"
    - "confirm your pattern"
    - "confirm your password"
    - "enter your password"
    - "set up screen lock"
    - "screen lock"
  payment:
    - "pay now"
    - "place order"
    - "checkout"
    - "purchase"
    - "buy now"
  permission:
    - "allow"
    - "grant access"
    - "deny"
    - "while using the app"
    - "only this time"
  privacy:
    - "face unlock"
    - "fingerprint"
    - "set up face"
    - "face & fingerprint"
    - "enroll face"
  irreversible:
    - "deactivate"
    - "close account"
    - "permanently delete"
  commit:
    - "submit"
    - "send"
    - "post"


# ──────────────────────────────────────────────────────────
# Scope policy defaults. Generic Android framework / launcher
# packages — never an app-specific allowlist.
# ──────────────────────────────────────────────────────────
scope:
  android_system_packages:
    - "android"
    - "com.android.documentsui"
    - "com.android.packageinstaller"
    - "com.google.android.packageinstaller"
    - "com.android.permissioncontroller"
    - "com.google.android.permissioncontroller"
    - "com.android.providers.media"
    - "com.android.intentresolver"
  system_ui_packages:
    - "com.android.systemui"
  launcher_patterns:
    - "com.android.launcher*"
    - "com.google.android.apps.nexuslauncher"
    - "com.google.android.launcher"
    - "com.sec.android.app.launcher"
    - "com.miui.home"
    - "com.huawei.android.launcher"
    - "com.oneplus.launcher"
  allow_android_system: true


# ──────────────────────────────────────────────────────────
# Exploration policy toggles
# ──────────────────────────────────────────────────────────
exploration:
  # If false (default), low-trust risk categories are blocked. Hard-block
  # categories (destructive / payment / irreversible / credential) are
  # ALWAYS blocked regardless of this flag — set them to low_trust below
  # only if you intentionally want to allow them under allow_risky.
  allow_risky: false
  # Optional per-category severity override. Keys are category names from
  # risk_categories; values are "hard_block" or "low_trust". Defaults:
  # destructive / payment / irreversible / credential -> hard_block;
  # permission / commit / privacy -> low_trust.
  risk_severity: {}
