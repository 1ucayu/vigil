<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="720" viewBox="0 0 1800 720" role="img" aria-labelledby="title desc">
  <title id="title">Verification-aware behavioral quotient</title>
  <desc id="desc">Flow diagram for Vigil's verification-aware behavioral quotient: trace evidence, verifier labels, initial partition, trace-aware refinement, action abstraction, determinism guard, and lifted replayable EFSM.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #111827; }
      .muted { fill: #4b5563; }
      .blue { fill: #4c78a8; }
      .green { fill: #2f855a; }
      .amber { fill: #b7791f; }
      .red { fill: #b91c1c; }
      .panel { fill: #ffffff; stroke: #7b7b7b; stroke-width: 2.5; stroke-dasharray: 9 8; }
      .subpanel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .soft { fill: #f3f4f6; stroke: #cbd5e1; stroke-width: 2; }
      .domain-s { fill: #a9bdc9; stroke: #111827; stroke-width: 2.5; }
      .domain-o { fill: #f0f9ff; stroke: #111827; stroke-width: 2.5; }
      .domain-a { fill: #fde7bd; stroke: #111827; stroke-width: 2.5; }
      .state { fill: #a9bdc9; stroke: #111827; stroke-width: 2.5; }
      .obs { fill: #f0f9ff; stroke: #111827; stroke-width: 2.5; }
      .act { fill: #fde7bd; stroke: #111827; stroke-width: 2.5; }
      .split { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2.5; }
      .text { font: 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 19px Arial, Helvetica, sans-serif; fill: #374151; }
      .tiny { font: 16px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .label { font: 700 25px Arial, Helvetica, sans-serif; fill: #111827; }
      .stage { font: 800 27px Arial, Helvetica, sans-serif; fill: #111827; }
      .math { font: italic 24px Georgia, "Times New Roman", serif; fill: #111827; }
      .math-sm { font: italic 20px Georgia, "Times New Roman", serif; fill: #111827; }
      .mono { font: 18px Menlo, Consolas, monospace; fill: #111827; }
      .mono-sm { font: 16px Menlo, Consolas, monospace; fill: #111827; }
      .arrow { stroke: #111827; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .arrow-muted { stroke: #6b7280; stroke-width: 2.4; fill: none; marker-end: url(#arrow-muted); }
      .arrow-red { stroke: #b91c1c; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .line { stroke: #111827; stroke-width: 2.5; fill: none; }
      .dash { stroke: #6b7280; stroke-width: 2.3; fill: none; stroke-dasharray: 8 7; }
      .dot { stroke: #111827; stroke-width: 3; stroke-dasharray: 6 10; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#111827"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="720"/>

  <!-- Legend -->
  <circle cx="50" cy="43" r="22" class="domain-s"/>
  <text x="50" y="51" text-anchor="middle" class="label">S</text>
  <text x="84" y="52" class="text">Abstraction Domain</text>
  <circle cx="340" cy="43" r="22" class="domain-o"/>
  <text x="340" y="51" text-anchor="middle" class="label">O</text>
  <text x="374" y="52" class="text">Observation Domain</text>
  <circle cx="635" cy="43" r="22" class="domain-a"/>
  <text x="635" y="51" text-anchor="middle" class="label">A</text>
  <text x="669" y="52" class="text">Action Domain</text>

  <!-- Vertical separators in Figure 1 style -->
  <line x1="415" y1="70" x2="415" y2="635" class="dot"/>
  <line x1="795" y1="70" x2="795" y2="635" class="dot"/>
  <line x1="1152" y1="70" x2="1152" y2="635" class="dot"/>

  <!-- Stage 1: observed trace evidence -->
  <rect x="30" y="86" width="350" height="230" rx="18" class="panel"/>
  <text x="205" y="124" text-anchor="middle" class="stage">Explored Trace Evidence</text>

  <circle cx="85" cy="186" r="25" class="obs"/>
  <text x="85" y="196" text-anchor="middle" class="math">o<tspan baseline-shift="sub" font-size="15">0</tspan></text>
  <circle cx="155" cy="186" r="25" class="obs"/>
  <text x="155" y="196" text-anchor="middle" class="math">o<tspan baseline-shift="sub" font-size="15">1</tspan></text>
  <circle cx="225" cy="186" r="25" class="obs"/>
  <text x="225" y="196" text-anchor="middle" class="math">o<tspan baseline-shift="sub" font-size="15">2</tspan></text>
  <circle cx="300" cy="186" r="25" class="obs"/>
  <text x="300" y="196" text-anchor="middle" class="math">o<tspan baseline-shift="sub" font-size="15">k</tspan></text>
  <path d="M 110 186 L 130 186" class="arrow-muted"/>
  <path d="M 180 186 L 200 186" class="arrow-muted"/>
  <path d="M 250 186 L 274 186" class="dash"/>
  <text x="205" y="236" text-anchor="middle" class="small">screenshots + accessibility XML</text>
  <text x="205" y="264" text-anchor="middle" class="math-sm">E<tspan baseline-shift="sub" font-size="13">E</tspan> = { (s,a,s') from traces }</text>
  <text x="205" y="292" text-anchor="middle" class="small">high-trust subset drives refinement</text>

  <!-- Stage 2: verifier label -->
  <rect x="450" y="86" width="310" height="230" rx="18" class="panel"/>
  <text x="605" y="124" text-anchor="middle" class="stage">Verifier Label</text>
  <text x="605" y="158" text-anchor="middle" class="math">&#x2113;<tspan baseline-shift="sub" font-size="15">V</tspan>: S<tspan baseline-shift="sub" font-size="15">E</tspan> &#x2192; L<tspan baseline-shift="sub" font-size="15">V</tspan></text>

  <rect x="475" y="181" width="260" height="82" rx="12" class="subpanel"/>
  <text x="494" y="211" class="math-sm">&#x2113;<tspan baseline-shift="sub" font-size="13">V</tspan>(s) = (act, win, dlg,</text>
  <text x="560" y="238" class="math-sm">surf, form, land, lab)</text>

  <text x="605" y="289" text-anchor="middle" class="small">keeps verifier predicates</text>
  <text x="605" y="314" text-anchor="middle" class="small">drops volatile values</text>

  <path d="M 380 201 C 408 201, 425 201, 445 201" class="arrow"/>

  <!-- Stage 3: initial partition -->
  <rect x="835" y="86" width="280" height="230" rx="18" class="panel"/>
  <text x="975" y="124" text-anchor="middle" class="stage">Initial Partition</text>
  <text x="975" y="158" text-anchor="middle" class="math">P<tspan baseline-shift="sub" font-size="15">0</tspan> by equal &#x2113;<tspan baseline-shift="sub" font-size="15">V</tspan></text>

  <rect x="865" y="180" width="90" height="82" rx="40" fill="#e5eef4" stroke="#111827" stroke-width="2"/>
  <circle cx="895" cy="218" r="18" class="state"/>
  <text x="895" y="225" text-anchor="middle" class="math-sm">s<tspan baseline-shift="super" font-size="12">1</tspan></text>
  <circle cx="930" cy="218" r="18" class="state"/>
  <text x="930" y="225" text-anchor="middle" class="math-sm">s<tspan baseline-shift="super" font-size="12">2</tspan></text>

  <rect x="995" y="180" width="90" height="82" rx="40" fill="#e5eef4" stroke="#111827" stroke-width="2"/>
  <circle cx="1025" cy="218" r="18" class="state"/>
  <text x="1025" y="225" text-anchor="middle" class="math-sm">s<tspan baseline-shift="super" font-size="12">3</tspan></text>
  <circle cx="1060" cy="218" r="18" class="state"/>
  <text x="1060" y="225" text-anchor="middle" class="math-sm">s<tspan baseline-shift="super" font-size="12">4</tspan></text>

  <text x="910" y="287" text-anchor="middle" class="math-sm">B<tspan baseline-shift="sub" font-size="13">1</tspan></text>
  <text x="1040" y="287" text-anchor="middle" class="math-sm">B<tspan baseline-shift="sub" font-size="13">2</tspan></text>
  <path d="M 760 201 C 790 201, 812 201, 830 201" class="arrow"/>

  <!-- Stage 4: trace-aware refinement -->
  <rect x="1190" y="86" width="560" height="230" rx="18" class="panel"/>
  <text x="1470" y="124" text-anchor="middle" class="stage">Trace-Aware Behavioral Refinement</text>

  <rect x="1220" y="150" width="220" height="112" rx="12" class="subpanel"/>
  <text x="1242" y="181" class="math-sm">&#x03C7;<tspan baseline-shift="sub" font-size="13">P</tspan>(s) :</text>
  <text x="1242" y="210" class="math-sm">&#x03B2;<tspan baseline-shift="sub" font-size="13">Q</tspan>(a<tspan baseline-shift="sub" font-size="13">1</tspan>) &#x21A6; [s'<tspan baseline-shift="sub" font-size="13">1</tspan>]<tspan baseline-shift="sub" font-size="13">P</tspan></text>
  <text x="1242" y="238" class="math-sm">&#x03B2;<tspan baseline-shift="sub" font-size="13">Q</tspan>(a<tspan baseline-shift="sub" font-size="13">2</tspan>) &#x21A6; [s'<tspan baseline-shift="sub" font-size="13">2</tspan>]<tspan baseline-shift="sub" font-size="13">P</tspan></text>

  <text x="1478" y="176" class="small">shared observed keys agree</text>
  <text x="1478" y="204" class="small">missing keys mean incomplete</text>
  <text x="1478" y="232" class="small">missing tolerated</text>

  <path d="M 1496 260 C 1532 288, 1574 288, 1606 262" class="arrow-red"/>
  <rect x="1618" y="209" width="108" height="86" rx="16" class="split"/>
  <text x="1672" y="240" text-anchor="middle" class="math-sm">u &#x21A6; B'</text>
  <text x="1672" y="268" text-anchor="middle" class="math-sm">u &#x21A6; B''</text>
  <text x="1672" y="294" text-anchor="middle" class="small red">split</text>

  <path d="M 1115 201 C 1144 201, 1168 201, 1185 201" class="arrow"/>

  <!-- Bottom: action abstraction -->
  <rect x="450" y="385" width="395" height="220" rx="18" class="panel"/>
  <text x="648" y="423" text-anchor="middle" class="stage">Action Abstraction</text>

  <rect x="480" y="451" width="150" height="112" rx="12" class="subpanel"/>
  <text x="500" y="478" class="mono-sm">{ "type": "click",</text>
  <text x="500" y="504" class="mono-sm">  "target": "node_8",</text>
  <text x="500" y="530" class="mono-sm">  "rid": ".../title",</text>
  <text x="500" y="556" class="mono-sm">  "bounds": [...] }</text>

  <path d="M 636 508 L 683 508" class="arrow"/>

  <rect x="692" y="440" width="122" height="58" rx="10" fill="#fff7ed" stroke="#b7791f" stroke-width="2"/>
  <text x="753" y="474" text-anchor="middle" class="math-sm">&#x03B2;<tspan baseline-shift="sub" font-size="13">Q</tspan>(a)</text>
  <text x="753" y="494" text-anchor="middle" class="tiny">for quotienting</text>

  <rect x="692" y="518" width="122" height="58" rx="10" fill="#ecfdf5" stroke="#2f855a" stroke-width="2"/>
  <text x="753" y="552" text-anchor="middle" class="math-sm">&#x03B1;(a)=&lt;&#x03C4;,q,v&gt;</text>
  <text x="753" y="572" text-anchor="middle" class="tiny">for replay</text>

  <text x="648" y="594" text-anchor="middle" class="small">coarse enough to merge, concrete enough to replay</text>

  <!-- Bottom: determinism guard -->
  <rect x="910" y="385" width="410" height="220" rx="18" class="panel"/>
  <text x="1115" y="423" text-anchor="middle" class="stage">Verifier Determinism Guard</text>

  <rect x="935" y="454" width="360" height="86" rx="12" class="subpanel"/>
  <text x="955" y="487" class="math-sm">&#x2200;B&#x2208;P*, &#x2200;u&#x2208;&#x03A3;<tspan baseline-shift="sub" font-size="13">Q</tspan>:</text>
  <text x="955" y="520" class="math-sm">| { B' | B --u, high-trust--&gt; B' } | &#x2264; 1</text>

  <text x="1115" y="568" text-anchor="middle" class="small">no high-confidence state/action pair</text>
  <text x="1115" y="594" text-anchor="middle" class="small">may lead to incompatible successors</text>

  <path d="M 845 500 C 872 500, 890 500, 905 500" class="arrow"/>
  <path d="M 1320 500 C 1352 500, 1370 500, 1388 500" class="arrow"/>

  <!-- Bottom: lifted EFSM -->
  <rect x="1395" y="385" width="355" height="220" rx="18" class="panel"/>
  <text x="1572" y="423" text-anchor="middle" class="stage">Lifted Replayable EFSM</text>

  <circle cx="1485" cy="505" r="31" class="state"/>
  <text x="1485" y="515" text-anchor="middle" class="math-sm">B</text>
  <circle cx="1638" cy="505" r="31" class="state"/>
  <text x="1638" y="515" text-anchor="middle" class="math-sm">B'</text>
  <path d="M 1517 505 C 1550 480, 1580 480, 1607 503" class="arrow"/>
  <text x="1562" y="464" text-anchor="middle" class="math-sm">&#x03B1;(a)=&lt;&#x03C4;,q,v&gt;</text>

  <text x="1572" y="565" text-anchor="middle" class="small">union raw-screen evidence</text>
  <text x="1572" y="591" text-anchor="middle" class="small">merge duplicates by canonical action identity</text>

  <!-- Cross-row arrows -->
  <path d="M 1470 316 C 1470 350, 1498 360, 1538 383" class="arrow-muted"/>
  <path d="M 1332 255 C 1250 335, 1188 345, 1126 383" class="arrow-muted"/>
  <path d="M 650 316 C 650 340, 649 359, 648 380" class="arrow-muted"/>

  <!-- Footer strip: three reasons -->
  <rect x="32" y="638" width="1718" height="64" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="58" y="666" class="small"><tspan font-weight="700">Verification-aware:</tspan> verifier label preserves checked predicates; trace-aware refinement uses observed high-trust actions and successors as ground truth.</text>
  <text x="58" y="692" class="small">Quotient keys merge conservatively while concrete canonical actions and provenance remain replayable in the emitted EFSM.</text>
</svg>
