<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Vigil overview model</title>
  <desc id="desc">Overview of Vigil as a DSL-guarded confidence-annotated EFSM, with offline evidence construction and online runtime verification.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #1f2937; }
      .muted { fill: #64748b; }
      .small { font: 22px Arial, Helvetica, sans-serif; }
      .body { font: 24px Arial, Helvetica, sans-serif; }
      .body-strong { font: 700 24px Arial, Helvetica, sans-serif; }
      .label { font: 700 25px Arial, Helvetica, sans-serif; }
      .title { font: 800 50px Arial, Helvetica, sans-serif; }
      .subtitle { font: italic 32px Arial, Helvetica, sans-serif; }
      .box-title { font: 800 30px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .formula { font: italic 27px Georgia, "Times New Roman", serif; fill: #1f2937; }
      .formula-sm { font: italic 22px Georgia, "Times New Roman", serif; fill: #1f2937; }
      .caption { font: 24px Arial, Helvetica, sans-serif; fill: #475569; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2.5; }
      .white-card { fill: #ffffff; stroke: #64748b; stroke-width: 2.5; }
      .blue-card { fill: #dbeafe; stroke: #4c78a8; stroke-width: 3; }
      .green-card { fill: #dcfce7; stroke: #2f855a; stroke-width: 3; }
      .amber-card { fill: #fef3c7; stroke: #b7791f; stroke-width: 3; }
      .purple-card { fill: #eef2ff; stroke: #4f46e5; stroke-width: 3; }
      .chip-blue { fill: #4c78a8; }
      .chip-green { fill: #2f855a; }
      .chip-amber { fill: #b7791f; }
      .chip-purple { fill: #4f46e5; }
      .line { stroke: #475569; stroke-width: 4; fill: none; }
      .thin-line { stroke: #94a3b8; stroke-width: 2.5; fill: none; }
      .graph-node { fill: #ffffff; stroke: #4c78a8; stroke-width: 3; }
      .goal-node { fill: #ecfdf5; stroke: #2f855a; stroke-width: 3; }
      .deny { fill: #b91c1c; font: 800 28px Arial, Helvetica, sans-serif; }
      .allow { fill: #166534; font: 800 28px Arial, Helvetica, sans-serif; }
      .uncertain { fill: #a16207; font: 800 28px Arial, Helvetica, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#475569"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#94a3b8"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text x="800" y="58" text-anchor="middle" class="title">Vigil Overview</text>
  <text x="800" y="98" text-anchor="middle" class="subtitle">
    <tspan>M</tspan><tspan baseline-shift="sub" font-size="22">A</tspan>
    <tspan> = &lt; S, s</tspan><tspan baseline-shift="sub" font-size="22">0</tspan>
    <tspan>, &#x03A3;, &#x03B4;, &#x0393;, I, &#x03C1; &gt;</tspan>
  </text>

  <!-- Left: offline construction evidence -->
  <rect x="55" y="145" width="350" height="610" rx="18" class="panel" filter="url(#softShadow)"/>
  <text x="230" y="190" text-anchor="middle" class="box-title">Offline Evidence</text>

  <rect x="85" y="225" width="290" height="125" rx="14" class="blue-card"/>
  <circle cx="118" cy="258" r="22" class="chip-blue"/>
  <text x="118" y="267" text-anchor="middle" fill="#ffffff" class="body-strong">1</text>
  <text x="150" y="260" class="body-strong">GUI Observations</text>
  <text x="110" y="300" class="small muted">accessibility XML</text>
  <text x="110" y="328" class="small muted">screenshots + widgets</text>

  <rect x="85" y="380" width="290" height="125" rx="14" class="green-card"/>
  <circle cx="118" cy="413" r="22" class="chip-green"/>
  <text x="118" y="422" text-anchor="middle" fill="#ffffff" class="body-strong">2</text>
  <text x="150" y="415" class="body-strong">Intent Semantics</text>
  <text x="110" y="455" class="small muted">DSL guard candidates</text>
  <text x="110" y="483" class="small muted">state / action invariants</text>

  <rect x="85" y="535" width="290" height="125" rx="14" class="amber-card"/>
  <circle cx="118" cy="568" r="22" class="chip-amber"/>
  <text x="118" y="577" text-anchor="middle" fill="#ffffff" class="body-strong">3</text>
  <text x="150" y="570" class="body-strong">Replay Trials</text>
  <text x="110" y="610" class="small muted">on-device execution</text>
  <text x="110" y="638" class="formula-sm">n<tspan baseline-shift="sub" font-size="15">succ</tspan> / n<tspan baseline-shift="sub" font-size="15">trial</tspan> &#x2192; &#x03C1;</text>

  <text x="230" y="710" text-anchor="middle" class="small muted">static priors are hints;</text>
  <text x="230" y="738" text-anchor="middle" class="small muted">traces/replay create edges</text>

  <!-- Center: model artifact -->
  <rect x="455" y="130" width="690" height="630" rx="18" class="panel" filter="url(#softShadow)"/>
  <text x="800" y="177" text-anchor="middle" class="box-title">Constructed Verification Model</text>
  <rect x="500" y="205" width="600" height="64" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="800" y="246" text-anchor="middle" class="formula">
    <tspan>M</tspan><tspan baseline-shift="sub" font-size="18">A</tspan>
    <tspan> = &lt; S, s</tspan><tspan baseline-shift="sub" font-size="18">0</tspan>
    <tspan>, &#x03A3;, &#x03B4;, &#x0393;, I, &#x03C1; &gt;</tspan>
  </text>

  <rect x="495" y="300" width="295" height="285" rx="16" class="blue-card"/>
  <text x="642" y="336" text-anchor="middle" class="label">GUI Topology</text>
  <circle cx="575" cy="420" r="37" class="graph-node"/>
  <circle cx="710" cy="395" r="37" class="graph-node"/>
  <circle cx="690" cy="510" r="37" class="goal-node"/>
  <path d="M 610 412 C 635 402, 650 399, 672 397" class="line" marker-end="url(#arrow)"/>
  <path d="M 711 433 C 715 458, 708 478, 698 491" class="line" marker-end="url(#arrow)"/>
  <path d="M 657 516 C 625 515, 603 496, 588 456" class="thin-line" marker-end="url(#arrow-muted)"/>
  <text x="575" y="428" text-anchor="middle" class="formula-sm">s</text>
  <text x="710" y="403" text-anchor="middle" class="formula-sm">s'</text>
  <text x="690" y="518" text-anchor="middle" class="formula-sm">g</text>
  <text x="645" y="382" text-anchor="middle" class="formula-sm">a=&lt;&#x03C4;,q,v&gt;</text>
  <text x="642" y="565" text-anchor="middle" class="small muted">(s, a, s') &#x2208; &#x03B4;</text>

  <rect x="820" y="300" width="280" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="842" y="332" class="formula-sm">S, s<tspan baseline-shift="sub" font-size="15">0</tspan></text>
  <text x="935" y="332" class="small muted">abstract GUI states</text>
  <rect x="820" y="360" width="280" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="842" y="392" class="formula-sm">&#x03A3;</text>
  <text x="935" y="392" class="small muted">canonical actions</text>
  <rect x="820" y="420" width="280" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="842" y="452" class="formula-sm">&#x03B4;</text>
  <text x="935" y="452" class="small muted">observed transitions</text>
  <rect x="820" y="480" width="280" height="50" rx="10" class="green-card"/>
  <text x="842" y="512" class="formula-sm">&#x0393;</text>
  <text x="935" y="512" class="small muted">DSL preconditions</text>
  <rect x="820" y="540" width="280" height="50" rx="10" class="green-card"/>
  <text x="842" y="572" class="formula-sm">I</text>
  <text x="935" y="572" class="small muted">invariants / effects</text>
  <rect x="820" y="600" width="280" height="50" rx="10" class="amber-card"/>
  <text x="842" y="632" class="formula-sm">&#x03C1;</text>
  <text x="935" y="632" class="small muted">replay confidence</text>

  <rect x="500" y="675" width="600" height="55" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="800" y="710" text-anchor="middle" class="small muted">Edges are evidence-backed; low trust stays in the model but gates to UNCERTAIN.</text>

  <!-- Right: online runtime monitor -->
  <rect x="1195" y="145" width="350" height="610" rx="18" class="panel" filter="url(#softShadow)"/>
  <text x="1370" y="190" text-anchor="middle" class="box-title">Online Monitor</text>

  <rect x="1225" y="225" width="290" height="115" rx="14" class="white-card"/>
  <text x="1370" y="260" text-anchor="middle" class="body-strong">Runtime Inputs</text>
  <text x="1270" y="300" class="formula-sm">o<tspan baseline-shift="sub" font-size="15">t</tspan></text>
  <text x="1320" y="300" class="small muted">screen XML / image</text>
  <text x="1270" y="328" class="formula-sm">a<tspan baseline-shift="sub" font-size="15">t</tspan></text>
  <text x="1320" y="328" class="small muted">agent action + intent</text>

  <path d="M 1370 350 L 1370 375" class="line" marker-end="url(#arrow)"/>
  <rect x="1225" y="390" width="290" height="115" rx="14" class="blue-card"/>
  <text x="1370" y="425" text-anchor="middle" class="body-strong">Canonicalize</text>
  <text x="1370" y="462" text-anchor="middle" class="formula-sm">&#x03B1;(o<tspan baseline-shift="sub" font-size="15">t</tspan>) = (s<tspan baseline-shift="sub" font-size="15">t</tspan>, p<tspan baseline-shift="sub" font-size="15">t</tspan>)</text>
  <text x="1370" y="492" text-anchor="middle" class="formula-sm">&#x03B2;(a<tspan baseline-shift="sub" font-size="15">t</tspan>) = u<tspan baseline-shift="sub" font-size="15">t</tspan> &#x2208; &#x03A3;</text>

  <path d="M 1370 515 L 1370 540" class="line" marker-end="url(#arrow)"/>
  <rect x="1225" y="555" width="290" height="120" rx="14" class="green-card"/>
  <text x="1370" y="590" text-anchor="middle" class="body-strong">ALLOW Gate</text>
  <text x="1250" y="626" class="formula-sm">p<tspan baseline-shift="sub" font-size="15">t</tspan> &#x2265; &#x03B8;<tspan baseline-shift="sub" font-size="15">loc</tspan>, (s<tspan baseline-shift="sub" font-size="15">t</tspan>,u<tspan baseline-shift="sub" font-size="15">t</tspan>,s') &#x2208; &#x03B4;</text>
  <text x="1250" y="654" class="formula-sm">&#x03C1; &#x2265; &#x03B8;<tspan baseline-shift="sub" font-size="15">&#x03C1;</tspan>, Reach(s', goal)</text>

  <rect x="1225" y="695" width="290" height="90" rx="14" class="purple-card"/>
  <text x="1370" y="727" text-anchor="middle" class="allow">ALLOW</text>
  <text x="1370" y="757" text-anchor="middle" class="deny">DENY</text>
  <text x="1370" y="787" text-anchor="middle" class="uncertain">UNCERTAIN</text>

  <!-- Cross-panel arrows -->
  <path d="M 405 450 L 448 450" class="line" marker-end="url(#arrow)"/>
  <path d="M 1145 450 L 1188 450" class="line" marker-end="url(#arrow)"/>
  <text x="430" y="430" text-anchor="middle" class="small muted">build</text>
  <text x="1168" y="430" text-anchor="middle" class="small muted">check</text>

  <!-- Hoare contract band -->
  <rect x="455" y="790" width="690" height="58" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.5"/>
  <text x="800" y="827" text-anchor="middle" class="formula-sm">
    { &#x0393;(s<tspan baseline-shift="sub" font-size="15">t</tspan>, u<tspan baseline-shift="sub" font-size="15">t</tspan>) } u<tspan baseline-shift="sub" font-size="15">t</tspan> { I(s<tspan baseline-shift="sub" font-size="15">t</tspan>, u<tspan baseline-shift="sub" font-size="15">t</tspan>, s') }
  </text>

  <rect x="80" y="805" width="310" height="43" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="235" y="833" text-anchor="middle" class="small muted">Offline construction is not in the online path.</text>
  <rect x="1205" y="805" width="310" height="43" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="1360" y="833" text-anchor="middle" class="small muted">Insufficient proof returns UNCERTAIN.</text>
</svg>
